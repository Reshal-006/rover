<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 16px;
      margin: 0;
      background-color: #0f172a;
      color: #f8fafc;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .logo {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      background: linear-gradient(135deg, #b8a8ff, #a8d8ff);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #0f172a;
      font-weight: 800;
      font-size: 14px;
    }
    h3 {
      margin: 0;
      color: #38bdf8;
      font-size: 16px;
      font-weight: 700;
    }
    p {
      font-size: 12px;
      color: #94a3b8;
      line-height: 1.5;
      margin: 0 0 16px 0;
    }
    .repo-box {
      background-color: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 11px;
      font-family: monospace;
      color: #cbd5e1;
      margin-bottom: 16px;
      word-break: break-all;
    }
    .btn {
      display: block;
      width: 100%;
      background: linear-gradient(135deg, #8b5cf6, #3b82f6);
      color: white;
      border: none;
      padding: 10px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      font-size: 13px;
      box-sizing: border-box;
      box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
      transition: opacity 0.2s;
    }
    .btn:hover {
      opacity: 0.9;
    }
    .disabled {
      background: #334155;
      color: #64748b;
      cursor: not-allowed;
      box-shadow: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">R</div>
    <h3>Rover Code Scanner</h3>
  </div>
  <p id="status-text">Detecting active GitHub repository page...</p>
  <div id="repo-info" class="repo-box" style="display: none;"></div>
  <button id="scan-btn" class="btn disabled" disabled>Scan with Rover</button>
  <script src="popup.js"></script>
</body>
</html>
