version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: rover-postgres
    restart: always
    environment:
      POSTGRES_DB: rover_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7.2-alpine
    container_name: rover-redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build:
      context: ..
      dockerfile: apps/backend/Dockerfile
    container_name: rover-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgrespassword@postgres:5432/rover_db
      - REDIS_URL=redis://redis:6379/0
      - USE_GITHUB_APP=${USE_GITHUB_APP}
      - GITHUB_APP_ID=${GITHUB_APP_ID}
      - GITHUB_PRIVATE_KEY=${GITHUB_PRIVATE_KEY}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    depends_on:
      - postgres
      - redis

  celery_worker:
    build:
      context: ..
      dockerfile: apps/backend/Dockerfile
    container_name: rover-celery-worker
    restart: always
    command: celery -A apps.backend.app.core.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgrespassword@postgres:5432/rover_db
      - REDIS_URL=redis://redis:6379/0
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - backend
      - redis

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    container_name: rover-web
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
